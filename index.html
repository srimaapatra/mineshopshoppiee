<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">SHOPIFY</div>
  <input type="text" id="search" class="search-bar" placeholder="Search products...">
</header>

<div class="container">

  <div class="sidebar">
    <h3>Filters</h3>

    <select id="category">
      <option value="">All Categories</option>
      <option>Electronics</option>
      <option>Fashion</option>
      <option>Home</option>
      <option>Books</option>
    </select>
<select id="price">
      <option value="">All Prices</option>
      <option value="low">Below 1000</option>
      <option value="mid">1000 - 10000</option>
      <option value="high">Above 10000</option>
    </select>

    <select id="rating">
      <option value="">All Ratings</option>
      <option value="4">4★ & above</option>
      <option value="3">3★ & above</option>
    </select>
  </div>

  <div class="main">

    <div class="controls">
      <h2>Products</h2>
      <select id="sort">
        <option value="">Sort</option>
        <option value="low">Price Low → High</option>
        <option value="high">Price High → Low</option>
        <option value="rating">Rating</option>
      </select>
    </div>

    <div class="products" id="products"></div>

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
